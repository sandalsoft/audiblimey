services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: audiblimey-db
    environment:
      POSTGRES_DB: audiblimey
      POSTGRES_USER: audiblimey
      POSTGRES_PASSWORD: audiblimey_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U audiblimey -d audiblimey"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
